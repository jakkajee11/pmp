# Workflow Enforcement Extensions Configuration
# Version: 2.0
# Last Updated: 2026-03-19

extensions:
  workflow-enforcement:
    enabled: true
    description: Automated Dev -> Reviewer -> QA pipeline enforcement with auto-review and auto-QA

    hooks:
      before_implement:
        command: dev
        description: Invoke developer agent to manage implementation workflow
        optional: false
        prompt: Load workflow state and begin developer workflow for task implementation

      after_implement:
        - command: handoff
          description: Handoff completed task to review queue
          optional: false
          prompt: Move completed task from in_development to in_review queue
        - command: autoReview
          description: Auto-review code quality and security (Balanced mode)
          optional: false
          prompt: Review all tasks in review queue using balanced mode - only errors and security issues fail

      after_review:
        - command: autoQA
          description: Auto-run QA tests for approved tasks (affected tests only)
          optional: false
          prompt: Test all tasks in QA queue using affected tests scope

    automation:
      enabled: true
      reviewMode: balanced
      qaScope: affected
      manualOverride: true

    stages:
      - name: development
        role: dev
        entryHook: dev
        exitHook: handoff
      - name: review
        role: reviewer
        autoProcess: autoReview
        onPass: in_qa
        onFail: in_development
      - name: qa
        role: qa
        autoProcess: autoQA
        onPass: completed
        onFail: in_development
      - name: completed
        role: null

    transitions:
      not_started:
        next: in_development
        command: dev
      in_development:
        next: in_review
        command: handoff
      in_review:
        onPass: in_qa
        onFail: in_development
        autoCommand: autoReview
      in_qa:
        onPass: completed
        onFail: in_development
        autoCommand: autoQA
      completed:
        terminal: true
