services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "13300:13300"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://pmp:pmp_password@db:5432/pmp?schema=public
      - NEXTAUTH_URL=http://localhost:13300
      - NEXTAUTH_SECRET=dev-secret-key-min-32-characters-long
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pmp-network
    command: npm run dev

  db:
    image: postgres:18-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=pmp
      - POSTGRES_PASSWORD=pmp_password
      - POSTGRES_DB=pmp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pmp -d pmp"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pmp-network

volumes:
  postgres_data:

networks:
  pmp-network:
    driver: bridge
